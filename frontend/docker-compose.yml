# Frontend Service (React + Nginx) - Standalone Docker Compose
# Usage: docker-compose up -d --build
#
# Gereksinimler:
#   - Shared network oluşturulmuş olmalı: docker network create campaign-network
#   - Backend servisi çalışıyor olmalı (nginx proxy için)
#
# Bu servis campaign-network üzerinden diğer servislerle haberleşir:
#   - backend: http://campaign-backend:3001 (nginx proxy ile)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: campaign-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - campaign-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  campaign-network:
    external: true
